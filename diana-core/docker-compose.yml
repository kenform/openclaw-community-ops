version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: diana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diana
      POSTGRES_PASSWORD: diana_dev_password
      POSTGRES_DB: diana
    ports:
      - "5433:5432"
    volumes:
      - diana_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diana -d diana"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: diana-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: diana-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://diana:diana_dev_password@postgres:5432/diana
      REDIS_URL: redis://redis:6379/0
      APP_ENV: dev
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  diana_pg_data:
