version: '3.9'
services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: cex
      POSTGRES_PASSWORD: cex
      POSTGRES_DB: cex_arcana
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  api:
    build: ../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://cex:cex@db:5432/cex_arcana
    depends_on: [db]
    ports: ["8000:8000"]

  collector:
    build: ../apps/collector
    environment:
      DATABASE_URL: postgresql+psycopg://cex:cex@db:5432/cex_arcana
      COLLECT_INTERVAL_SEC: 45
    depends_on: [db]

volumes:
  db_data:
